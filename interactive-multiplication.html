<template class="page-data" data-id="4" data-name="练习">
  <style>
    :host {
      min-height:100vh;
      background:#eff6ff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }
    .practice {
      width:100%;
      max-width:960px;
      background:#fff;
      border-radius:32px;
      padding:40px;
      box-shadow:0 25px 45px rgba(8,47,92,0.16);
    }
    h2 {
      margin:0 0 10px;
      font-size:32px;
      color:#2e7dff;
    }
    p {
      font-size:17px;
      line-height:1.7;
      color:#2f2f2f;
    }
    .buttons {
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
      gap:18px;
    }
    .answer {
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
      background:#fff7ef;
      box-shadow:0 15px 25px rgba(0,0,0,0.1);
      transition:transform 0.3s ease, box-shadow 0.3s ease;
    }
    .answer.selected {
      box-shadow:0 0 0 4px rgba(46,125,255,0.3);
    }
    .answer.correct {
      background:linear-gradient(140deg,#7be495,#34c26b);
      color:#053410;
      box-shadow:none;
    }
    .answer.wrong {
      background:linear-gradient(140deg,#fb8c7d,#ef4f5f);
      color:#fff;
      box-shadow:none;
    }
    .feedback {
      margin-top:26px;
      min-height:60px;
      font-size:22px;
      font-weight:600;
      color:#1f1f1f;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .dot {
      width:18px;
      height:18px;
      border-radius:50%;
    }
  </style>
  <div class="practice" aria-live="polite">
    <h2>练习题：平均分</h2>
    <p>24 颗糖果平均分给 6 个小朋友，每人分几颗？</p>
    <div class="buttons" id="choices">
      <button class="answer" data-value="3">24÷6=3</button>
      <button class="answer" data-value="18">6×3=18</button>
      <button class="answer" data-value="4">6×4=24</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <script>
    (function(){
      const feedback = document.getElementById("feedback");
      const choices = document.querySelectorAll(".answer");
      const state = { selected:"", correctStreak:0 };

      function announce(text, color){
        feedback.textContent = "";
        const dot = document.createElement("span");
        dot.className = "dot";
        dot.style.background = color;
        feedback.appendChild(dot);
        const span = document.createElement("span");
        span.textContent = text;
        feedback.appendChild(span);
        anime({
          targets:feedback,
          translateY:[18,0],
          opacity:[0,1],
          duration:360,
          easing:"easeOutQuad"
        });
      }

      function clear(){
        choices.forEach(btn=>btn.classList.remove("selected","correct","wrong"));
      }

      function handleClick(evt){
        const btn = evt.currentTarget;
        const value = btn.dataset.value;
        clear();
        btn.classList.add("selected");
        state.selected = value;
        if (value === "4"){
          state.correctStreak += 1;
          btn.classList.add("correct");
          announce("答对了！24÷6=4，用乘法也能检查 6×4=24。", "#34c26b");
        } else {
          state.correctStreak = 0;
          btn.classList.add("wrong");
          announce("不是的，要把 24 颗糖平均分 6 份，刚好每份 4 颗。", "#f56b7c");
        }
        saveState();
      }

      function saveState(){
        if (window.__CW_MODE__ === "thumbnail") return;
        window.parent.postMessage({ type:"saveState", state }, "*");
      }

      choices.forEach(btn=>btn.addEventListener("click",handleClick));

      window.addEventListener("message",function(e){
        if (e.data && e.data.type === "restoreState"){
          const saved = e.data.state || {};
          state.selected = saved.selected || "";
          state.correctStreak = saved.correctStreak || 0;
          if (state.selected) {
            const btn = document.querySelector(`.answer[data-value="${state.selected}"]`);
            if (btn) {
              btn.classList.add(state.selected === "4" ? "correct" : "wrong");
              btn.classList.add("selected");
            }
            const msg = state.selected === "4" ? "保持正确，再练习多几个挑战！" : "继续读题再来一次吧。";
            announce(msg, state.selected === "4" ? "#34c26b" : "#f56b7c");
          }
        }
      });

      saveState();
    })();
  </script>
</template>

<template class="page-data" data-id="5" data-name="配对挑战">
  <style>
    :host {
      min-height:100vh;
      background:#f5fff6;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
    }
    .panel {
      width:100%;
      max-width:960px;
      background:#fff;
      border-radius:30px;
      padding:40px;
      box-shadow:0 25px 45px rgba(0,0,0,0.14);
    }
    h2 {
      margin:0 0 8px;
      font-size:32px;
      color:#1f7b3b;
    }
    p {
      margin:0 0 20px;
      color:#2c2c2c;
      font-size:18px;
    }
    .story-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
      margin-bottom:24px;
    }
    .story-card {
      padding:18px;
      border-radius:18px;
      border:2px dashed rgba(46,125,255,0.4);
      background:#f3f7ff;
      cursor:pointer;
      transition:border-color 0.3s ease, transform 0.3s ease;
    }
    .story-card.selected {
      border-color:#2e7dff;
      transform:translateY(-6px);
    }
    .story-card.correct {
      border-color:#34c26b;
      background:#e6fff2;
    }
    .chips {
      display:flex;
      flex-wrap:wrap;
      gap:14px;
    }
    .chip {
      padding:12px 20px;
      border-radius:18px;
      border:2px solid transparent;
      background:#fff;
      cursor:pointer;
      font-weight:600;
      transition:border-color 0.3s ease, transform 0.2s ease;
    }
    .chip.matched {
      border-color:#34c26b;
      background:#e6fff2;
      color:#1a4b2c;
    }
    .chip.wrong {
      border-color:#f56b7c;
      background:#ffe6e4;
      color:#a20c0c;
    }
    .feedback {
      margin-top:22px;
      font-size:20px;
      font-weight:600;
      color:#1b1b1b;
    }
  </style>
  <div class="panel">
    <h2>配对挑战</h2>
    <p>先点一个故事卡，再从右边的算式中挑一个，当故事与算式匹配，页面会用动画告诉你答对了。</p>
    <div class="story-grid" id="storyGrid">
      <div class="story-card" data-id="a">
        <strong>4 盒书包</strong>
        <p>每盒有 3 个文具包，要算一共有多少个。</p>
      </div>
      <div class="story-card" data-id="b">
        <strong>30 颗糖果</strong>
        <p>平均分给 5 个人，每人分几颗。</p>
      </div>
      <div class="story-card" data-id="c">
        <strong>24 支铅笔</strong>
        <p>每支 6 元，一共多少钱。</p>
      </div>
    </div>
    <div class="chips" id="chipRow">
      <div class="chip" data-target="a">4×3=12</div>
      <div class="chip" data-target="b">30÷5=6</div>
      <div class="chip" data-target="c">24÷6=4</div>
      <div class="chip" data-target="a">12÷4=3</div>
      <div class="chip" data-target="c">6×4=24</div>
    </div>
    <div class="feedback" id="matchFeedback">先点击一个故事。</div>
  </div>

  <script>
    (function(){
      const stories = document.querySelectorAll(".story-card");
      const chips = document.querySelectorAll(".chip");
      const feedback = document.getElementById("matchFeedback");
      let activeStory = null;

      function setFeedback(text, color){
        feedback.textContent = text;
        feedback.style.color = color;
        anime({
          targets:feedback,
          scale:[0.95,1],
          opacity:[0.5,1],
          duration:350,
          easing:"easeOutBack"
        });
      }

      stories.forEach(card=>{
        card.addEventListener("click",()=>{
          if (card.classList.contains("correct")) return;
          stories.forEach(c=>c.classList.remove("selected"));
          card.classList.add("selected");
          activeStory = card.dataset.id;
          setFeedback("现在再点一个算式，与故事配对。", "#1f4b8f");
        });
      });

      chips.forEach(chip=>{
        chip.addEventListener("click",()=>{
          if (!activeStory) {
            setFeedback("先选一个故事，再选算式。", "#d44747");
            return;
          }
          if (chip.classList.contains("matched")) return;
          const target = chip.dataset.target;
          if (target === activeStory) {
            chip.classList.add("matched");
            document.querySelector(`.story-card[data-id="${activeStory}"]`).classList.add("correct");
            setFeedback("太棒了！配对正确，继续挑战下一个故事。", "#34c26b");
            anime({
              targets:chip,
              scale:[1.1,1],
              duration:420,
              easing:"easeOutElastic(1, .7)"
            });
          } else {
            chip.classList.add("wrong");
            setFeedback("有点偏了，再读题意尝试。", "#f56b7c");
            setTimeout(()=>chip.classList.remove("wrong"),400);
            anime({
              targets:chip,
              translateX:[0,-5,5,0],
              duration:450,
              easing:"easeInOutSine"
            });
          }
          stories.forEach(c=>c.classList.remove("selected"));
          activeStory = null;
        });
      });
    })();
  </script>
